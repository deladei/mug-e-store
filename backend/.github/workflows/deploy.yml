name: Deploy

# Deploy on merge to main — but only after CI is green. This listens for the CI
# workflow to finish and triggers a Render deploy via a Deploy Hook only when
# that run succeeded on main. Because render.yaml sets autoDeploy: false, this is
# the single, test-gated path to production.
#
# Setup (one-time): Render dashboard → the coffeemug-api service → Settings →
# Deploy Hook → copy the URL → add it as the repo secret RENDER_DEPLOY_HOOK_URL
# (Settings → Secrets and variables → Actions).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Never run two deploys at once; let the newest win.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: trigger Render deploy
    runs-on: ubuntu-latest
    # Only when the CI run we are reacting to actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Fire Render Deploy Hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set — add it in repo Settings → Secrets → Actions"
            exit 1
          fi
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Render deploy triggered for commit ${{ github.event.workflow_run.head_sha }}"
